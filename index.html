<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS 2.0 HD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">

    <!-- TELA DE BOOT -->
    <div id="boot-screen">
        <div class="boot-content">
            <div class="logo-animation">
                <i class="fa-brands fa-windows"></i>
            </div>
            <h1>WebOS</h1>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
            <p>Iniciando sistema...</p>
            <!-- Botão removido -->
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop">
        <div class="desktop-icon" onclick="openApp('explorer')">
            <i class="fa-solid fa-folder-open" style="color: #ffd700;"></i>
            <span>Arquivos</span>
        </div>
        <div class="desktop-icon" onclick="openApp('browser')">
            <i class="fa-brands fa-chrome" style="color: #ea4335;"></i>
            <span>WikiBrowser</span>
        </div>
        <div class="desktop-icon" onclick="openApp('notepad')">
            <i class="fa-solid fa-file-lines" style="color: #fff;"></i>
            <span>Notas</span>
        </div>
        <div class="desktop-icon" onclick="openApp('todo')">
            <i class="fa-solid fa-list-check" style="color: #9ece6a;"></i>
            <span>Tarefas</span>
        </div>
        <div class="desktop-icon" onclick="openApp('tictactoe')">
            <i class="fa-solid fa-gamepad" style="color: #bb9af7;"></i>
            <span>Jogo</span>
        </div>
        <div class="desktop-icon" onclick="openApp('monitor')">
            <i class="fa-solid fa-chart-line" style="color: #f7768e;"></i>
            <span>Monitor</span>
        </div>
        <div class="desktop-icon" onclick="openApp('settings')">
            <i class="fa-solid fa-gear" style="color: #acadb9;"></i>
            <span>Ajustes</span>
        </div>
        <div class="desktop-icon" onclick="openApp('terminal')">
            <i class="fa-solid fa-terminal" style="color: #7aa2f7;"></i>
            <span>Terminal</span>
        </div>
    </div>

    <!-- MENU INICIAR -->
    <div id="start-menu" class="hidden">
        <div class="start-header">
            <div class="user-profile">
                <i class="fa-solid fa-user-circle"></i>
                <span>Admin</span>
            </div>
        </div>
        <div class="start-apps">
            <div class="start-item" onclick="openApp('explorer'); toggleStartMenu()"><i class="fa-solid fa-folder"></i> Arquivos</div>
            <div class="start-item" onclick="openApp('browser'); toggleStartMenu()"><i class="fa-brands fa-chrome"></i> WikiBrowser</div>
            <div class="start-item" onclick="openApp('notepad'); toggleStartMenu()"><i class="fa-solid fa-file-lines"></i> Bloco de Notas</div>
            <div class="start-item" onclick="openApp('todo'); toggleStartMenu()"><i class="fa-solid fa-list-check"></i> Tarefas</div>
            <div class="start-item" onclick="openApp('calculator'); toggleStartMenu()"><i class="fa-solid fa-calculator"></i> Calculadora</div>
            <div class="start-item" onclick="openApp('tictactoe'); toggleStartMenu()"><i class="fa-solid fa-gamepad"></i> Jogo da Velha</div>
            <div class="start-item" onclick="openApp('monitor'); toggleStartMenu()"><i class="fa-solid fa-chart-line"></i> Monitor</div>
            <div class="start-item" onclick="openApp('settings'); toggleStartMenu()"><i class="fa-solid fa-gear"></i> Ajustes</div>
            <div class="start-item" onclick="openApp('terminal'); toggleStartMenu()"><i class="fa-solid fa-terminal"></i> Terminal</div>
        </div>
        <div class="start-footer">
            <button onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Reiniciar</button>
        </div>
    </div>

    <!-- BARRA DE TAREFAS (Sem controle de volume) -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()"><i class="fa-brands fa-windows"></i></div>
        <div id="taskbar-apps"></div>
        <div id="system-tray">
            <div id="clock">
                <span id="time">00:00</span>
                <span id="date">01/01</span>
            </div>
        </div>
    </div>

    <!-- NOTIFICAÇÕES -->
    <div id="notification-container"></div>

    <!-- MENU DE CONTEXTO -->
    <div id="context-menu" class="hidden">
        <div class="ctx-item" onclick="refreshDesktop()"><i class="fa-solid fa-rotate-right"></i> Atualizar</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item" onclick="openApp('settings')"><i class="fa-solid fa-image"></i> Papel de Parede</div>
        <div class="ctx-item" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i> Alternar Tema</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item" onclick="openApp('terminal')"><i class="fa-solid fa-terminal"></i> Abrir Terminal</div>
    </div>

    <!-- TEMPLATES (Mantidos iguais aos anteriores) -->
    <template id="tpl-explorer">
        <div class="window-content explorer-layout">
            <div class="explorer-sidebar">
                <div class="sidebar-item" onclick="renderFiles('/')"><i class="fa-solid fa-house"></i> Home</div>
                <div class="sidebar-item" onclick="createNewFilePrompt()"><i class="fa-solid fa-plus"></i> Novo Arquivo</div>
            </div>
            <div class="explorer-main"></div>
        </div>
    </template>

    <template id="tpl-browser">
        <div class="window-content browser-layout">
            <div class="browser-bar">
                <button onclick="navWiki('back')"><i class="fa-solid fa-arrow-left"></i></button>
                <button onclick="navWiki('fwd')"><i class="fa-solid fa-arrow-right"></i></button>
                <input type="text" value="https://pt.wikipedia.org/wiki/Página_principal" readonly>
                <button onclick="navWiki('refresh')"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <iframe src="https://pt.m.wikipedia.org/wiki/Página_principal" id="wiki-frame"></iframe>
        </div>
    </template>

    <template id="tpl-notepad">
        <div class="window-content notepad-layout">
            <textarea id="notepad-area" placeholder="Digite algo..."></textarea>
            <div class="notepad-controls">
                <button onclick="saveNotepadContent(this)">Salvar</button>
                <span id="notepad-status">Pronto</span>
            </div>
        </div>
    </template>

    <template id="tpl-todo">
        <div class="window-content todo-layout">
            <div class="todo-input-group">
                <input type="text" id="todo-input" placeholder="Nova tarefa...">
                <button onclick="addTodo()">Add</button>
            </div>
            <ul id="todo-list"></ul>
        </div>
    </template>

    <template id="tpl-calculator">
        <div class="window-content calculator-layout">
            <input type="text" id="calc-display" readonly>
            <div class="calc-buttons">
                <button onclick="calcInput('C')">C</button><button onclick="calcInput('/')">/</button><button onclick="calcInput('*')">*</button><button onclick="calcInput('back')">←</button>
                <button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button onclick="calcInput('-')">-</button>
                <button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button onclick="calcInput('+')">+</button>
                <button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button onclick="calcInput('=')" class="btn-equal">=</button>
                <button onclick="calcInput('0')" class="btn-zero">0</button><button onclick="calcInput('.')">.</button>
            </div>
        </div>
    </template>

    <template id="tpl-tictactoe">
        <div class="window-content tictactoe-layout">
            <div class="game-status">Vez de: <span id="ttt-turn">X</span></div>
            <div class="game-board" id="ttt-board"></div>
            <button class="reset-game" onclick="initTicTacToe()">Reiniciar Jogo</button>
        </div>
    </template>

    <template id="tpl-monitor">
        <div class="window-content monitor-layout">
            <div class="monitor-card">
                <h3>CPU</h3>
                <div class="progress-bar"><div class="fill" id="cpu-fill" style="width: 0%"></div></div>
                <span id="cpu-text">0%</span>
            </div>
            <div class="monitor-card">
                <h3>RAM</h3>
                <div class="progress-bar"><div class="fill" id="ram-fill" style="width: 0%"></div></div>
                <span id="ram-text">0%</span>
            </div>
            <div class="monitor-card">
                <h3>DISCO</h3>
                <div class="progress-bar"><div class="fill" id="disk-fill" style="width: 45%"></div></div>
                <span>45%</span>
            </div>
        </div>
    </template>

    <template id="tpl-settings">
        <div class="window-content settings-layout">
            <h3>Personalização</h3>
            <div class="setting-group">
                <label>Tema:</label>
                <button onclick="toggleTheme()">Alternar Claro/Escuro</button>
            </div>
            <div class="setting-group">
                <label>Papel de Parede (HD):</label>
                <div class="wallpaper-grid">
                    <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=300')" 
                         data-hd="https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=1920&auto=format&fit=crop" 
                         onclick="setWallpaperHD(this)"></div>
                    <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=300')" 
                         data-hd="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop" 
                         onclick="setWallpaperHD(this)"></div>
                    <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=300')" 
                         data-hd="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop" 
                         onclick="setWallpaperHD(this)"></div>
                    <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=300')" 
                         data-hd="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop" 
                         onclick="setWallpaperHD(this)"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-terminal">
        <div class="window-content terminal-layout" onclick="refocusTerminal(this)">
            <div class="terminal-output"></div>
            <div class="terminal-input-line">
                <span class="prompt">user@webos:~$</span>
                <input type="text" class="term-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
