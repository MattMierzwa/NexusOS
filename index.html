<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">

    <!-- TELA DE BOOT -->
    <div id="boot-screen">
        <div class="boot-content">
            <svg class="nexus-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" /><stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" /></linearGradient></defs>
                <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="url(#grad1)" stroke-width="4" />
                <circle cx="50" cy="50" r="15" fill="url(#grad1)" />
                <path d="M50 20 L50 35 M50 65 L50 80 M25 35 L38 42 M62 58 L75 65 M25 65 L38 58 M62 42 L75 35" stroke="white" stroke-width="3" stroke-linecap="round" />
            </svg>
            <h1>NexusOS</h1>
            <div class="loader-bar"><div class="loader-progress"></div></div>
            <p>Inicializando Núcleo...</p>
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop">
        <div class="desktop-icon" onclick="openApp('explorer')"><i class="fa-solid fa-folder-tree" style="color: #ffd700;"></i><span>Explorador</span></div>
        <div class="desktop-icon" onclick="openApp('weather')"><i class="fa-solid fa-cloud-sun-rain" style="color: #00d2ff;"></i><span>Clima</span></div>
        <div class="desktop-icon" onclick="openApp('browser')"><i class="fa-solid fa-globe" style="color: #ea4335;"></i><span>Navegador</span></div>
        <div class="desktop-icon" onclick="openApp('notepad')"><i class="fa-solid fa-pen-nib" style="color: #fff;"></i><span>Editor</span></div>
        <div class="desktop-icon" onclick="openApp('todo')"><i class="fa-solid fa-check-double" style="color: #00f260;"></i><span>Tarefas</span></div>
        <div class="desktop-icon" onclick="openApp('calendar')"><i class="fa-solid fa-calendar-alt" style="color: #ff416c;"></i><span>Agenda</span></div>
        <div class="desktop-icon" onclick="openApp('monitor')"><i class="fa-solid fa-chart-line" style="color: #f7768e;"></i><span>Monitor</span></div>
        <div class="desktop-icon" onclick="openApp('settings')"><i class="fa-solid fa-sliders-h" style="color: #acadb9;"></i><span>Sistema</span></div>
    </div>

    <!-- MENU INICIAR -->
    <div id="start-menu" class="hidden">
        <div class="start-header">
            <div class="user-profile"><div class="avatar-circle">N</div><span>Usuário Nexus</span></div>
        </div>
        <div class="start-apps">
            <div class="start-item" onclick="openApp('explorer'); toggleStartMenu()"><i class="fa-solid fa-folder-tree"></i> Explorador</div>
            <div class="start-item" onclick="openApp('weather'); toggleStartMenu()"><i class="fa-solid fa-cloud-sun-rain"></i> Clima</div>
            <div class="start-item" onclick="openApp('browser'); toggleStartMenu()"><i class="fa-solid fa-globe"></i> Navegador</div>
            <div class="start-item" onclick="openApp('notepad'); toggleStartMenu()"><i class="fa-solid fa-pen-nib"></i> Editor</div>
            <div class="start-item" onclick="openApp('todo'); toggleStartMenu()"><i class="fa-solid fa-check-double"></i> Tarefas</div>
            <div class="start-item" onclick="openApp('calendar'); toggleStartMenu()"><i class="fa-solid fa-calendar-alt"></i> Agenda</div>
            <div class="start-item" onclick="openApp('monitor'); toggleStartMenu()"><i class="fa-solid fa-chart-line"></i> Monitor</div>
            <div class="start-item" onclick="openApp('settings'); toggleStartMenu()"><i class="fa-solid fa-sliders-h"></i> Sistema</div>
        </div>
        <div class="start-footer"><button onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Reiniciar</button></div>
    </div>

    <!-- BARRA DE TAREFAS -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()"><svg width="24" height="24" viewBox="0 0 100 100"><path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="var(--accent-color)" stroke="white" stroke-width="5"/></svg></div>
        <div id="taskbar-apps"></div>
        <div id="system-tray">
            <div id="volume-btn" onclick="toggleMute()"><i class="fa-solid fa-volume-high" id="vol-icon"></i></div>
            <div id="clock"><div id="time">00:00</div><div id="date">01/01</div></div>
        </div>
    </div>

    <div id="notification-container"></div>

    <!-- MENU DE CONTEXTO -->
    <div id="context-menu" class="hidden">
        <div class="ctx-item" onclick="refreshDesktop()"><i class="fa-solid fa-sync"></i> Atualizar</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item" onclick="openApp('settings')"><i class="fa-solid fa-image"></i> Personalização</div>
        <div class="ctx-item" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i> Modo Noturno</div>
    </div>

    <!-- TEMPLATES -->
    <template id="tpl-explorer">
        <div class="window-content explorer-layout">
            <div class="explorer-sidebar">
                <div class="sidebar-item" onclick="renderFiles('/')"><i class="fa-solid fa-house"></i> Home</div>
                <div class="sidebar-item" onclick="renderFiles('trash')"><i class="fa-solid fa-trash-can"></i> Lixeira</div>
                <div class="sidebar-item" onclick="createNewFilePrompt()"><i class="fa-solid fa-plus"></i> Novo Arquivo</div>
            </div>
            <div class="explorer-main"></div>
        </div>
    </template>

    <template id="tpl-weather">
        <div class="window-content weather-layout">
            <div class="weather-search">
                <input type="text" id="city-input" placeholder="Digite a cidade...">
                <button onclick="fetchWeather()"><i class="fa-solid fa-search"></i></button>
            </div>
            <div id="weather-display" class="weather-info">
                <div class="loading">Carregando clima...</div>
            </div>
        </div>
    </template>

    <template id="tpl-browser"><div class="window-content browser-layout"><div class="browser-bar"><button onclick="navWiki('back')"><i class="fa-solid fa-arrow-left"></i></button><input type="text" value="https://pt.wikipedia.org" readonly><button onclick="navWiki('refresh')"><i class="fa-solid fa-redo"></i></button></div><iframe src="https://pt.m.wikipedia.org" id="wiki-frame"></iframe></div></template>
    <template id="tpl-notepad"><div class="window-content notepad-layout"><textarea id="notepad-area" placeholder="Escreva..."></textarea><div class="notepad-controls"><button onclick="saveNotepadContent(this)">Salvar</button><span id="notepad-status">Pronto</span></div></div></template>
    <template id="tpl-todo"><div class="window-content todo-layout"><div class="todo-input-group"><input type="text" id="todo-input" placeholder="Nova tarefa..."><button onclick="addTodo()">Add</button></div><ul id="todo-list"></ul></div></template>
    <template id="tpl-calculator"><div class="window-content calculator-layout"><input type="text" id="calc-display" readonly><div class="calc-buttons"><button onclick="calcInput('C')">C</button><button onclick="calcInput('/')">/</button><button onclick="calcInput('*')">*</button><button onclick="calcInput('back')">←</button><button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button onclick="calcInput('-')">-</button><button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button onclick="calcInput('+')">+</button><button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button onclick="calcInput('=')" class="btn-equal">=</button><button onclick="calcInput('0')" class="btn-zero">0</button><button onclick="calcInput('.')">.</button></div></div></template>
    
    <template id="tpl-monitor">
        <div class="window-content monitor-layout">
            <div class="monitor-card">
                <h3>CPU Usage</h3>
                <canvas id="cpu-chart" width="300" height="60"></canvas>
                <span id="cpu-text">0%</span>
            </div>
            <div class="monitor-card">
                <h3>RAM Usage</h3>
                <canvas id="ram-chart" width="300" height="60"></canvas>
                <span id="ram-text">0%</span>
            </div>
            <div class="process-list" id="process-list"></div>
        </div>
    </template>

    <!-- TEMPLATE SETTINGS COMPLETO RESTAURADO -->
    <template id="tpl-settings">
        <div class="window-content settings-layout">
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="switchTab('visual')"><i class="fa-solid fa-paintbrush"></i> Visual</button>
                <button class="tab-btn" onclick="switchTab('system')"><i class="fa-solid fa-microchip"></i> Sistema</button>
            </div>
            
            <div id="tab-visual" class="tab-content active">
                <div class="setting-group">
                    <label>Tema Base:</label>
                    <button onclick="toggleTheme()" class="full-width-btn"><i class="fa-solid fa-adjust"></i> Alternar Claro / Escuro</button>
                </div>

                <div class="setting-group">
                    <label>Cor de Destaque (Accent):</label>
                    <div class="color-picker-grid">
                        <div class="color-option" style="background: #7aa2f7;" onclick="setAccentColor('#7aa2f7', 'linear-gradient(135deg, #6a11cb 0%, #2575fc 100%)')"></div>
                        <div class="color-option" style="background: #bb9af7;" onclick="setAccentColor('#bb9af7', 'linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%)')"></div>
                        <div class="color-option" style="background: #9ece6a;" onclick="setAccentColor('#9ece6a', 'linear-gradient(135deg, #00b09b 0%, #96c93d 100%)')"></div>
                        <div class="color-option" style="background: #f7768e;" onclick="setAccentColor('#f7768e', 'linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%)')"></div>
                        <div class="color-option" style="background: #e0af68;" onclick="setAccentColor('#e0af68', 'linear-gradient(135deg, #f2994a 0%, #f2c94c 100%)')"></div>
                        <div class="color-option" style="background: #00d2ff;" onclick="setAccentColor('#00d2ff', 'linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%)')"></div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <label>Transparência das Janelas:</label>
                    <input type="range" min="0.5" max="1" step="0.05" value="0.85" id="opacity-slider" oninput="setWindowOpacity(this.value)" style="width:100%">
                    <small id="opacity-value" style="opacity:0.7; font-size:11px;">85%</small>
                </div>

                <div class="setting-group">
                    <label>Papel de Parede:</label>
                    <div class="wallpaper-grid">
                        <!-- Tech / Circuit -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=300')" data-src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Abstract Purple -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=300')" data-src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Space / Stars -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=300')" data-src="https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Red Mountains -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=300')" data-src="https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Night Sky -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=300')" data-src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Neon City -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=300')" data-src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Landscape -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=300')" data-src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                        <!-- Abstract Colorful -->
                        <div class="wp-thumb" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=300')" data-src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1920&auto=format&fit=crop" onclick="setWallpaper(this)"></div>
                    </div>
                </div>
            </div>

            <div id="tab-system" class="tab-content">
                <div class="setting-group">
                    <label>Informações do Sistema:</label>
                    <div class="sys-info">
                        <p><strong>OS:</strong> NexusOS v2.2</p>
                        <p><strong>Kernel:</strong> WebKit Hybrid</p>
                        <p><strong>Memória:</strong> Virtualizada</p>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Ações:</label>
                    <button onclick="location.reload()" class="full-width-btn danger-btn"><i class="fa-solid fa-power-off"></i> Reiniciar Sistema</button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-terminal"><div class="window-content terminal-layout" onclick="refocusTerminal(this)"><div class="terminal-output"></div><div class="terminal-input-line"><span class="prompt">nexus@root:~$</span><input type="text" class="term-input" autocomplete="off" spellcheck="false"></div></div></template>
    <template id="tpl-calendar"><div class="window-content calendar-layout"><div class="cal-header"><button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button><h3 id="cal-month-year">Mês Ano</h3><button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button></div><div class="cal-weekdays"><span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span></div><div class="cal-days" id="cal-days-grid"></div><div id="event-modal" class="hidden"><div class="modal-content"><h4 id="modal-date-title">Data</h4><textarea id="event-note" placeholder="Lembrete..."></textarea><div class="modal-actions"><button onclick="saveEvent()" class="btn-save">Salvar</button><button onclick="closeEventModal()" class="btn-cancel">Cancelar</button></div></div></div></div></template>

    <script src="script.js"></script>
</body>
</html>
